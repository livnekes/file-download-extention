<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Downloader</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --accent: #e8543a;
      --accent-dim: rgba(232, 84, 58, 0.15);
      --text: #e8e6e3;
      --muted: #6b6b78;
      --success: #4caf82;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 400px;
      min-height: 120px;
      max-height: 560px;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .logo-text span {
      color: var(--accent);
    }

    .badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--accent);
      letter-spacing: 0.05em;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .btn {
      flex: 1;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #d44830;
      border-color: #d44830;
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-wrap: nowrap;
    }

    .filter-btn {
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      text-transform: capitalize;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .state-empty, .state-loading, .state-none {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .state-empty .icon, .state-loading .icon, .state-none .icon {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
      opacity: 0.5;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .file-list {
      overflow-y: auto;
      max-height: 340px;
      padding: 8px 0;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .file-item:last-child { border-bottom: none; }
    .file-item:hover { background: var(--surface); }

    .file-check {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }

    .file-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .file-info {
      flex: 1;
      overflow: hidden;
    }

    .file-name {
      font-weight: 500;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .file-url {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ext-badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .file-dl-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .file-dl-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .file-dl-btn.done {
      border-color: var(--success);
      color: var(--success);
    }

    .folder-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .folder-bar label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .folder-bar input {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      outline: none;
    }

    .folder-bar input:focus {
      border-color: var(--accent);
    }

    .folder-bar input::placeholder {
      color: var(--muted);
    }

    .footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">⬇</div>
      <div class="logo-text">File<span>.</span>grab</div>
    </div>
    <div class="badge" id="countBadge" style="display:none">0 found</div>
  </div>

  <div id="stateEmpty" class="state-empty">
    <span class="icon">🔍</span>
    Click <strong>Scan Page</strong> to find documents on this page.
  </div>

  <div id="stateLoading" class="state-loading" style="display:none">
    <div class="spinner"></div>
    <div>Scanning page for documents…</div>
  </div>

  <div id="stateNone" class="state-none" style="display:none">
    <span class="icon">🚫</span>
    No document links found on this page.
  </div>

  <div id="folderBar" class="folder-bar" style="display:none">
    <label>Save to:</label>
    <input type="text" id="folderInput" placeholder="Downloads/" spellcheck="false" />
  </div>

  <div id="toolbar" class="toolbar" style="display:none">
    <button class="btn" id="btnSelectAll">☑ Select All</button>
    <button class="btn btn-primary" id="btnDownloadSelected">⬇ Download Selected</button>
  </div>

  <div id="filterBar" class="filter-bar" style="display:none"></div>

  <div id="fileList" class="file-list" style="display:none"></div>

  <div id="footer" class="footer" style="display:none">
    <span id="footerCount">–</span>
    <span>FileGrab v2.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
